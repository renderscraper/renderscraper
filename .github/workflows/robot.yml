name: Robot Scraper LunaTec 24/7

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    
    concurrency:
      group: scraper-unico
      cancel-in-progress: false

    # Esto silencia la advertencia amarilla actualizando Node internamente
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🚀 Ejecutar todas las plataformas
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_MAX_CONCURRENCY: '10'
        # ¡Corregido! Le quitamos la palabra "run" del final
        run: python app.py run
